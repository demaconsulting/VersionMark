---
sections:
  - title: VersionMark Requirements
    sections:
      - title: OTS Software
        requirements:
          - id: VersionMark-OTS-MSTest
            title: MSTest shall execute unit tests and report results.
            justification: |
              MSTest (MSTest.TestFramework and MSTest.TestAdapter) is the unit-testing
              framework used by the project. It discovers and runs all test methods and
              writes test result files (TRX and JUnit formats) that feed into coverage
              reporting and requirements traceability. Passing tests confirm the framework
              is functioning correctly.
            tags: [ots]
            tests:
              - Context_Create_NoArguments_ReturnsDefaultContext
              - Context_Create_VersionFlag_SetsVersionTrue
              - Context_Create_HelpFlag_SetsHelpTrue
              - Context_Create_SilentFlag_SetsSilentTrue
              - Context_Create_ValidateFlag_SetsValidateTrue
              - Context_Create_ResultsFlag_SetsResultsFile
              - Context_Create_LogFlag_OpensLogFile
              - Context_Create_UnknownArgument_ThrowsArgumentException
              - Context_Create_ShortVersionFlag_SetsVersionTrue

          - id: VersionMark-OTS-ReqStream
            title: ReqStream shall enforce that every requirement is linked to passing test evidence.
            justification: |
              DemaConsulting.ReqStream processes requirements.yaml and TRX test-result
              files to produce requirements reports, justifications, and a traceability
              matrix. When run with --enforce, it exits with a non-zero code if any
              requirement lacks test evidence. A successful pipeline run with --enforce
              proves all requirements are covered and that ReqStream is functioning.
            tags: [ots]
            tests:
              - ReqStream_EnforcementMode

          - id: VersionMark-OTS-BuildMark
            title: BuildMark shall generate build-notes documentation from GitHub Actions metadata.
            justification: |
              DemaConsulting.BuildMark queries the GitHub API to capture workflow run
              details and renders them as a markdown build-notes document included in
              release artifacts. A successful pipeline run is evidence that BuildMark
              executed without error.
            tags: [ots]
            tests:
              - BuildMark_MarkdownReportGeneration

          - id: VersionMark-OTS-SarifMark
            title: SarifMark shall convert CodeQL SARIF results into a markdown report.
            justification: |
              DemaConsulting.SarifMark reads the SARIF output produced by CodeQL code
              scanning and renders it as a human-readable markdown document included in
              release artifacts. A successful pipeline run is evidence that SarifMark
              executed without error.
            tags: [ots]
            tests:
              - SarifMark_SarifReading
              - SarifMark_MarkdownReportGeneration

          - id: VersionMark-OTS-SonarMark
            title: SonarMark shall generate a SonarCloud quality report.
            justification: |
              DemaConsulting.SonarMark retrieves quality-gate and metrics data from
              SonarCloud and renders it as a markdown document included in release
              artifacts. A successful pipeline run is evidence that SonarMark executed
              without error.
            tags: [ots]
            tests:
              - SonarMark_QualityGateRetrieval
              - SonarMark_IssuesRetrieval
              - SonarMark_HotSpotsRetrieval
              - SonarMark_MarkdownReportGeneration

          - id: VersionMark-OTS-ReviewMark
            title: ReviewMark shall generate a review plan and review report from the review configuration.
            justification: |
              DemaConsulting.ReviewMark reads the .reviewmark.yaml configuration and the
              review evidence store to produce a review plan and review report documenting
              file review coverage and currency. It runs in the same CI pipeline that
              produces the TRX test results, so a successful pipeline run is evidence that
              ReviewMark executed without error.
            tags: [ots]
            tests:
              - ReviewMark_ReviewPlanGeneration
              - ReviewMark_ReviewReportGeneration
