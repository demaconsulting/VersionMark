---
sections:
  - title: OTS Software Requirements
    sections:
      - title: BuildMark
        requirements:
          - id: VersionMark-OTS-BuildMark
            title: BuildMark shall generate build-notes documentation from GitHub Actions metadata.
            justification: |
              DemaConsulting.BuildMark queries the GitHub API to capture workflow run
              details and renders them as a markdown build-notes document included in
              release artifacts. A successful pipeline run is evidence that BuildMark
              executed without error.
            tags: [ots]
            tests:
              - BuildMark_MarkdownReportGeneration
