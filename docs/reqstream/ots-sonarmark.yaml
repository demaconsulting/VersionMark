---
sections:
  - title: OTS Software Requirements
    sections:
      - title: SonarMark
        requirements:
          - id: VersionMark-OTS-SonarMark
            title: SonarMark shall generate a SonarCloud quality report.
            justification: |
              DemaConsulting.SonarMark retrieves quality-gate and metrics data from
              SonarCloud and renders it as a markdown document included in release
              artifacts. A successful pipeline run is evidence that SonarMark executed
              without error.
            tags: [ots]
            tests:
              - SonarMark_QualityGateRetrieval
              - SonarMark_IssuesRetrieval
              - SonarMark_HotSpotsRetrieval
              - SonarMark_MarkdownReportGeneration
