---
# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets.

# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - "README.md"
  - "docs/user_guide/**/*.md"
  - "**/*.cs"
  - "requirements.yaml"
  - "docs/reqstream/**/*.yaml"
  - "docs/design/**/*.md"
  - "!**/obj/**"

# Evidence source: review data and index.json are located in the 'reviews' branch
# of this repository, accessed through the GitHub public HTTPS raw content access.
evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/VersionMark/reviews/index.json

# Review sets grouping files by logical unit of review.
reviews:
  # Purpose review - proves advertised features match system design
  - id: Purpose
    title: Review that Advertised Features Match System Design
    paths:
      - "README.md"
      - "docs/user_guide/**/*.md"
      - "docs/reqstream/version-mark/version-mark.yaml"     # system requirements
      - "docs/design/introduction.md"                        # design introduction and architecture
      - "docs/design/version-mark/version-mark.md"          # system design

  # System-level reviews
  - id: VersionMark-Architecture
    title: Review that VersionMark Architecture Satisfies Requirements
    paths:
      - "docs/reqstream/version-mark/version-mark.yaml"     # system requirements
      - "docs/design/introduction.md"                        # design introduction and architecture
      - "docs/design/version-mark/version-mark.md"          # system design
      - "test/**/IntegrationTests.cs"                        # integration tests
      - "test/**/AssemblyInfo.cs"                            # test infrastructure
      - "test/**/Runner.cs"                                  # test infrastructure

  - id: VersionMark-Design
    title: Review that VersionMark Design is Consistent and Complete
    paths:
      - "docs/reqstream/version-mark/version-mark.yaml"          # system requirements
      - "docs/reqstream/version-mark/platform-requirements.yaml"  # platform requirements
      - "docs/design/introduction.md"                             # design introduction
      - "docs/design/version-mark/**/*.md"                       # all system design documents

  - id: VersionMark-AllRequirements
    title: Review that All VersionMark Requirements are Complete
    paths:
      - "requirements.yaml"                                  # root requirements file
      - "docs/reqstream/**/*.yaml"                           # all requirements files

  # Cli Subsystem
  - id: VersionMark-Cli
    title: Review that VersionMark Cli Satisfies Subsystem Requirements
    paths:
      - "docs/reqstream/version-mark/cli/cli.yaml"          # subsystem requirements
      - "docs/design/version-mark/cli/cli.md"               # subsystem design
      - "test/**/Cli/CliSubsystemTests.cs"                  # subsystem tests

  - id: VersionMark-Cli-Program
    title: Review that VersionMark Cli Program Implementation is Correct
    paths:
      - "docs/reqstream/version-mark/cli/program.yaml"      # requirements
      - "docs/design/version-mark/cli/program.md"           # design
      - "src/**/Program.cs"                                  # implementation
      - "test/**/ProgramTests.cs"                            # unit tests

  - id: VersionMark-Cli-Context
    title: Review that VersionMark Cli Context Implementation is Correct
    paths:
      - "docs/reqstream/version-mark/cli/context.yaml"      # requirements
      - "docs/design/version-mark/cli/context.md"           # design
      - "src/**/Cli/Context.cs"                              # implementation
      - "test/**/Cli/ContextTests.cs"                        # unit tests

  # Configuration Subsystem
  - id: VersionMark-Configuration
    title: Review that VersionMark Configuration Satisfies Subsystem Requirements
    paths:
      - "docs/reqstream/version-mark/configuration/configuration.yaml"          # subsystem requirements
      - "docs/design/version-mark/configuration/configuration.md"               # subsystem design
      - "test/**/Configuration/ConfigurationSubsystemTests.cs"                  # subsystem tests
      - "test/**/Configuration/ConfigurationLoadSubsystemTests.cs"              # load subsystem tests

  - id: VersionMark-Configuration-VersionMarkConfig
    title: Review that VersionMark Configuration VersionMarkConfig Implementation is Correct
    paths:
      - "docs/reqstream/version-mark/configuration/version-mark-config.yaml"    # requirements
      - "docs/design/version-mark/configuration/version-mark-config.md"         # design
      - "src/**/Configuration/VersionMarkConfig.cs"                             # implementation
      - "test/**/Configuration/VersionMarkConfigTests.cs"                       # unit tests
      - "test/**/Configuration/VersionMarkConfigLoadTests.cs"                   # Load method unit tests

  - id: VersionMark-Configuration-ToolConfig
    title: Review that VersionMark Configuration ToolConfig Implementation is Correct
    paths:
      - "docs/reqstream/version-mark/configuration/tool-config.yaml"            # requirements
      - "docs/design/version-mark/configuration/tool-config.md"                 # design
      - "src/**/Configuration/VersionMarkConfig.cs"                             # implementation
      - "test/**/Configuration/VersionMarkConfigTests.cs"                       # unit tests

  - id: VersionMark-Configuration-LintIssue
    title: Review that VersionMark Configuration LintIssue Implementation is Correct
    paths:
      - "docs/reqstream/version-mark/configuration/load.yaml"                   # requirements
      - "docs/design/version-mark/configuration/lint-issue.md"                  # design
      - "src/**/Configuration/LintIssue.cs"                                     # implementation
      - "test/**/Configuration/LintIssueTests.cs"                               # unit tests

  # Capture Subsystem
  - id: VersionMark-Capture
    title: Review that VersionMark Capture Satisfies Subsystem Requirements
    paths:
      - "docs/reqstream/version-mark/capture/capture.yaml"  # subsystem requirements
      - "docs/design/version-mark/capture/capture.md"       # subsystem design
      - "test/**/Capture/CaptureSubsystemTests.cs"          # subsystem tests

  - id: VersionMark-Capture-VersionInfo
    title: Review that VersionMark Capture VersionInfo Implementation is Correct
    paths:
      - "docs/reqstream/version-mark/capture/version-info.yaml"  # requirements
      - "docs/design/version-mark/capture/version-info.md"        # design
      - "src/**/Capture/VersionInfo.cs"                           # implementation
      - "test/**/Capture/VersionInfoTests.cs"                     # unit tests

  # Publishing Subsystem
  - id: VersionMark-Publishing
    title: Review that VersionMark Publishing Satisfies Subsystem Requirements
    paths:
      - "docs/reqstream/version-mark/publishing/publishing.yaml"  # subsystem requirements
      - "docs/design/version-mark/publishing/publishing.md"       # subsystem design
      - "test/**/Publishing/PublishingSubsystemTests.cs"          # subsystem tests

  - id: VersionMark-Publishing-MarkdownFormatter
    title: Review that VersionMark Publishing MarkdownFormatter Implementation is Correct
    paths:
      - "docs/reqstream/version-mark/publishing/markdown-formatter.yaml"  # requirements
      - "docs/design/version-mark/publishing/markdown-formatter.md"       # design
      - "src/**/Publishing/MarkdownFormatter.cs"                          # implementation
      - "test/**/Publishing/MarkdownFormatterTests.cs"                    # unit tests

  # SelfTest Subsystem
  - id: VersionMark-SelfTest
    title: Review that VersionMark SelfTest Satisfies Subsystem Requirements
    paths:
      - "docs/reqstream/version-mark/self-test/self-test.yaml"   # subsystem requirements
      - "docs/design/version-mark/self-test/self-test.md"        # subsystem design
      - "test/**/SelfTest/SelfTestSubsystemTests.cs"             # subsystem tests

  - id: VersionMark-SelfTest-Validation
    title: Review that VersionMark SelfTest Validation Implementation is Correct
    paths:
      - "docs/reqstream/version-mark/self-test/validation.yaml"  # requirements
      - "docs/design/version-mark/self-test/validation.md"       # design
      - "src/**/SelfTest/Validation.cs"                          # implementation
      - "test/**/SelfTest/SelfTestSubsystemTests.cs"             # subsystem tests (no separate unit test file)

  - id: VersionMark-SelfTest-PathHelpers
    title: Review that VersionMark SelfTest PathHelpers Implementation is Correct
    paths:
      - "docs/reqstream/version-mark/self-test/path-helpers.yaml"  # requirements
      - "docs/design/version-mark/self-test/path-helpers.md"       # design
      - "src/**/SelfTest/PathHelpers.cs"                           # implementation
      - "test/**/SelfTest/PathHelpersTests.cs"                     # unit tests
