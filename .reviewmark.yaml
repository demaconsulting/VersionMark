---
# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets.

# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - "**/*.cs"
  - "!**/obj/**"

# Evidence source: review data and index.json are located in the 'reviews' branch
# of this repository, accessed through the GitHub public HTTPS raw content access.
evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/VersionMark/reviews/index.json

# Review sets grouping files by logical unit of review.
reviews:
  - id: VersionMark-CommandLine-Review
    title: Review of VersionMark Command Line
    paths:
      - "docs/reqstream/command-line.yaml"
      - "docs/reqstream/capture.yaml"
      - "docs/reqstream/publish.yaml"
      - "docs/design/command-line.md"
      - "src/**/Program.cs"
      - "src/**/Context.cs"
      - "test/**/ProgramTests.cs"
      - "test/**/ContextTests.cs"
      - "test/**/IntegrationTests.cs"
      - "test/**/Runner.cs"
      - "test/**/AssemblyInfo.cs"

  - id: VersionMark-Utilities-Review
    title: Review of VersionMark Utilities
    paths:
      - "docs/reqstream/formatter.yaml"
      - "docs/design/utilities.md"
      - "src/**/PathHelpers.cs"
      - "src/**/MarkdownFormatter.cs"
      - "test/**/PathHelpersTests.cs"
      - "test/**/MarkdownFormatterTests.cs"

  - id: VersionMark-Configuration-Review
    title: Review of VersionMark Configuration
    paths:
      - "docs/reqstream/configuration.yaml"
      - "docs/design/configuration.md"
      - "src/**/VersionMarkConfig.cs"
      - "test/**/VersionMarkConfigTests.cs"

  - id: VersionMark-VersionInfo-Review
    title: Review of VersionMark Version Information
    paths:
      - "docs/design/version-info.md"
      - "src/**/VersionInfo.cs"
      - "test/**/VersionInfoTests.cs"

  - id: VersionMark-Validation-Review
    title: Review of VersionMark Self-Validation
    paths:
      - "docs/design/validation.md"
      - "src/**/Validation.cs"

  - id: VersionMark-Lint-Review
    title: Review of VersionMark Lint
    paths:
      - "docs/reqstream/lint.yaml"
      - "docs/design/lint.md"
      - "src/**/Lint.cs"
      - "test/**/LintTests.cs"
